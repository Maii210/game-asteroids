<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroides - Juego Espacial</title>
  <meta name="description" content="Juego clásico de asteroides con nave espacial, disparos y niveles progresivos" />
  <link rel="stylesheet" href="/estilos.css" />
</head>
<body>
  <canvas id="lienzo"></canvas>
  <div id="panel-instrucciones">
    <span class="tecla">← → / A D</span> Rotar
    <span class="tecla">↑ / W</span> Avanzar
    <span class="tecla">ESPACIO</span> Disparar
  </div>
  </body>
  <script src="/config.js"></script>
  <script src="/creacion.js"></script>
  <script src="/dibujo.js"></script>
  <script>
    lienzo.width = window.innerWidth;
    lienzo.height = window.innerHeight;
    inicializarEstrellas(lienzo.width, lienzo.height);
    
    estadoJuego = crearEstadoInicial(lienzo.width, lienzo.height);
    
    dibujarFondoEstrellas();
    dibujarNave(estadoJuego.nave);
  </script>
</html>
